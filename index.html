
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NOIZE Fitness & Lifestyle | Build Strength. Shape Life.</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/logo.png" />
    
    <!-- Preload Critical Assets -->
    <link rel="preload" href="/images/bodybuilding.jpg" as="image" />
    <link rel="preload" href="/images/logo.png" as="image" />
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #0E0E0E;
        color: #FFFFFF;
        scroll-behavior: smooth;
      }
      .glass {
        background: rgba(18, 18, 18, 0.65);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(229, 192, 123, 0.15);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
      }
      .gold-gradient {
        background: linear-gradient(135deg, #E5C07B 0%, #C39945 100%);
      }
      .text-gold {
        color: #E5C07B;
      }
      .border-gold {
        border-color: #E5C07B;
      }
      .bg-gold {
        background-color: #E5C07B;
      }
      
      /* Global Interactive Physics */
      a:active, button:active, [role="button"]:active {
        transform: scale(0.96) !important;
      }
      .glass {
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.3s ease, border-color 0.3s ease;
      }
      .glass:hover {
        border-color: rgba(229, 192, 123, 0.4) !important;
        box-shadow: 0 15px 45px -10px rgba(229, 192, 123, 0.25) !important;
        transform: translateY(-4px);
      }
      
      /* GPU Acceleration for background blurs to stop scroll lag */
      [class*="blur-"] {
        transform: translateZ(0);
        backface-visibility: hidden;
        perspective: 1000px;
      }
      .gold-gradient {
        transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .gold-gradient:hover {
        filter: brightness(1.15);
        box-shadow: 0 10px 30px rgba(229, 192, 123, 0.5) !important;
      }
      .gym-surface {
        background:
          radial-gradient(circle at 18% 14%, rgba(229, 192, 123, 0.08), transparent 40%),
          radial-gradient(circle at 78% 4%, rgba(229, 192, 123, 0.05), transparent 40%),
          linear-gradient(135deg, #050505 0%, #0d0d0d 50%, #030303 100%);
      }
      .gym-line-grid {
        background-image:
          linear-gradient(rgba(229, 192, 123, 0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(229, 192, 123, 0.03) 1px, transparent 1px);
        background-size: 60px 60px;
      }
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(229, 192, 123, 0.3);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(229, 192, 123, 0.6);
      }
      .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
        scroll-behavior: smooth;
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none;
      }
      @keyframes scroll-desktop {
        0% { transform: translateX(0); }
        100% { transform: translateX(calc(-33.333%)); }
      }
      .animate-scroll-desktop {
        animation: scroll-desktop 40s linear infinite;
        will-change: transform;
      }
      .animate-scroll-desktop:hover {
        animation-play-state: paused;
      }
      @keyframes auto-scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(calc(-50% - 1rem)); } 
      }
      @media (min-width: 768px) {
        @keyframes auto-scroll {
          0% { transform: translateX(0); }
          100% { transform: translateX(calc(-50% - 2rem)); } 
        }
      }
      .animate-auto-scroll {
        animation: auto-scroll 30s linear infinite;
        will-change: transform;
      }
      .animate-auto-scroll:hover {
        animation-play-state: paused;
      }
      @keyframes media-drift {
        0% { transform: scale(1.0); }
        50% { transform: scale(1.04); }
        100% { transform: scale(1.0); }
      }
      .animate-media-drift {
        animation: media-drift 20s ease-in-out infinite;
        will-change: transform;
      }
      @keyframes lift-pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
      }
      .animate-lift-pulse {
        animation: lift-pulse 3s ease-in-out infinite;
      }
      
      /* Hero Section Animations */
      @keyframes fadeInDown {
        0% { opacity: 0; transform: translateY(-20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes fadeInUp {
        0% { opacity: 0; transform: translateY(20px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      
      @keyframes fadeIn {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }
      
      @keyframes zoomIn {
        0% { transform: scale(1.05); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
      }
      
      @keyframes glow {
        0%, 100% { text-shadow: 0 0 10px rgba(229, 192, 123, 0.2); }
        50% { text-shadow: 0 0 20px rgba(229, 192, 123, 0.4); }
      }
      
      .animate-fade-in-down {
        animation: fadeInDown 0.8s ease-out forwards;
        opacity: 0;
      }
      
      .animate-fade-in-up {
        animation: fadeInUp 0.8s ease-out forwards;
        opacity: 0;
      }
      
      .animate-fade-in {
        animation: fadeIn 1s ease-out forwards;
        opacity: 0;
      }
      
      .animate-zoom-in {
        animation: zoomIn 20s ease-out forwards;
      }
      
      .animate-glow {
        animation: glow 2s ease-in-out infinite;
      }
      
      @keyframes gradient {
        0%, 100% {
          background-size: 200% 200%;
          background-position: left center;
        }
        50% {
          background-size: 200% 200%;
          background-position: right center;
        }
      }
      
      .animate-gradient {
        animation: gradient 3s ease infinite;
        background-size: 200% 200%;
      }
      
      /* Image Loading Optimization */
      img {
        content-visibility: auto;
      }
      img[loading="lazy"] {
        background: rgba(26, 26, 26, 0.4);
      }
      
      /* Reduce layout shift */
      img, video {
        max-width: 100%;
        height: auto;
      }
    </style>
